databases:
  - name: clothing-store-db
    plan: starter
    postgresMajorVersion: 15

services:
  - type: web
    name: clothing-store-web
    env: python
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: gunicorn clothing_store.wsgi
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: clothing_store.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: clothing-store-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: REDIS_URL
        value: ""
      - key: DISABLE_CACHE
        value: "true"
      - key: FEATURE_NEW_ARRIVALS_SECTION
        value: "true"
      - key: FEATURE_ADS_SECTION
        value: "true"
