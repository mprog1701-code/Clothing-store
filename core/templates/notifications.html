{% extends 'base.html' %}

{% block title %}الإشعارات{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <h2 class="mb-3 text-center">الإشعارات</h2>
    {% if notifications %}
      <div class="list-group">
        {% for n in notifications %}
          <div class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
              <strong>{{ n.title }}</strong>
              <small class="text-muted">{{ n.time|date:"Y-m-d H:i" }}</small>
            </div>
            <div class="text-muted mt-1">{{ n.body }}</div>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <div class="text-center text-muted">لا توجد إشعارات حالياً</div>
    {% endif %}
  </div>
{% endblock %}
